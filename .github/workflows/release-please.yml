name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          target-branch: main

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build-extension.yml

  upload-release:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: dist

      - name: Prepare release asset name
        run: |
          mv dist/chrome-mv3-prod.zip "dist/${{ needs.build.outputs.zip_name }}"

      - name: Upload release asset
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "dist/${{ needs.build.outputs.zip_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
