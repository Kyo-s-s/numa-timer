name: Build Extension Artifact

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-extension.yml

  publish-main-latest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: dist

      - name: Prepare rolling release asset
        run: |
          cp dist/chrome-mv3-prod.zip dist/numa-timer-main-latest.zip

      - name: Update rolling release for main
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: main-latest
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Rolling release updated from `main`.
            Commit: `${{ github.sha }}`
          files: dist/numa-timer-main-latest.zip
          overwrite_files: true
